{% extends 'base.html' %}
{% block title %}Forgot password — ToolX{% endblock %}

{% block extra_css %}
<style>
  .auth-wrap { min-height:calc(100vh - 64px); display:flex; align-items:center; background:var(--tx-black); position:relative; overflow:hidden; }
  .auth-card { background:var(--tx-white); border-radius:4px; padding:2.5rem; width:100%; max-width:420px; margin:0 auto; position:relative; z-index:1; }
  .auth-brand { font-family:var(--font-display); font-weight:800; font-size:1.6rem; letter-spacing:-0.03em; color:var(--tx-black); margin-bottom:0.3rem; }
  .auth-label { font-size:0.75rem; font-weight:600; letter-spacing:0.09em; text-transform:uppercase; color:var(--tx-muted); margin-bottom:0.35rem; display:block; }
  .auth-input { width:100%; border:1.5px solid var(--tx-border); border-radius:2px; padding:0.6rem 0.9rem; font-size:0.9rem; color:var(--tx-black); background:var(--tx-white); transition:border-color 0.2s; font-family:var(--font-body); }
  .auth-input:focus { outline:none; border-color:var(--tx-black); }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="container">
    <div class="auth-card">
      <div class="auth-brand">Tool<span style="color:var(--tx-accent)">X</span></div>
      <p style="color:var(--tx-muted); font-size:0.85rem; margin-bottom:2rem;">
        Enter your email or phone number and we'll send you a reset code.
      </p>

      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="auth-label">Email or phone number</label>
          <input type="text" name="contact" class="auth-input"
            placeholder="you@example.com or +91 9999999999" autofocus required>
        </div>
        <button type="submit" class="btn btn-tx-accent w-100">Send reset code →</button>
      </form>

      <div class="text-center mt-3">
        <a href="{% url 'login' %}" style="font-size:0.82rem; color:var(--tx-muted);">← Back to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
