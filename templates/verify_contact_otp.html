{% extends 'base.html' %}
{% block title %}Verify new contact — ToolX{% endblock %}

{% block extra_css %}
<style>
  .auth-wrap { min-height:calc(100vh - 64px); display:flex; align-items:center; background:var(--tx-black); position:relative; overflow:hidden; }
  .auth-card { background:var(--tx-white); border-radius:4px; padding:2.5rem; width:100%; max-width:420px; margin:0 auto; position:relative; z-index:1; }
  .auth-brand { font-family:var(--font-display); font-weight:800; font-size:1.6rem; letter-spacing:-0.03em; color:var(--tx-black); margin-bottom:0.3rem; }
  .auth-label { font-size:0.75rem; font-weight:600; letter-spacing:0.09em; text-transform:uppercase; color:var(--tx-muted); margin-bottom:0.35rem; display:block; }
  .otp-input { width:100%; border:1.5px solid var(--tx-border); border-radius:2px; padding:0.9rem; font-size:1.8rem; font-family:var(--font-display); font-weight:700; letter-spacing:0.4em; text-align:center; color:var(--tx-black); background:var(--tx-white); transition:border-color 0.2s; }
  .otp-input:focus { outline:none; border-color:var(--tx-black); }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="container">
    <div class="auth-card">
      <div class="auth-brand">Tool<span style="color:var(--tx-accent)">X</span></div>
      <p style="color:var(--tx-muted); font-size:0.85rem; margin-bottom:2rem;">
        We sent a verification code to
        <strong style="color:var(--tx-black);">{{ contact }}</strong>
        via {{ method }}.
      </p>

      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="auth-label">Enter verification code</label>
          <input type="text" name="otp_code" class="otp-input"
            placeholder="000000" maxlength="6"
            inputmode="numeric" autofocus>
        </div>
        <button type="submit" class="btn btn-tx-accent w-100">Verify & update →</button>
      </form>

      <div class="text-center mt-3">
        <a href="{% url 'profile' %}" style="font-size:0.82rem; color:var(--tx-muted);">← Cancel</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
