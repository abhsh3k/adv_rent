{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} – ToolX Admin{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
  :root {
    --primary:       #6366f1;
    --primary-dark:  #4f46e5;
    --primary-light: #e0e7ff;
    --accent:        #f59e0b;
    --success:       #10b981;
    --danger:        #ef4444;
    --surface:       #ffffff;
    --surface-alt:   #f8fafc;
    --border:        #e2e8f0;
    --text:          #1e293b;
    --text-muted:    #64748b;
    --sidebar-bg:    #1e1b4b;
    --sidebar-text:  #c7d2fe;
    --sidebar-hover: #312e81;
    --radius:        0.75rem;
    --shadow:        0 4px 24px rgba(99,102,241,.08);
    --transition:    all .2s ease;
  }

  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: var(--surface-alt);
    color: var(--text);
    margin: 0;
  }

  /* ── Top Bar ── */
  #header {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  #header a:link, #header a:visited { color: #e0e7ff; text-decoration: none; }

  #branding h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -.5px;
    margin: 0;
    color: #fff;
  }

  #branding h1 a { color: #fff !important; }

  #user-tools {
    font-size: .8rem;
    color: var(--sidebar-text);
  }

  #user-tools a {
    color: #a5b4fc !important;
    margin-left: .75rem;
    transition: var(--transition);
  }

  #user-tools a:hover { color: #fff !important; }

  /* ── Nav Sidebar ── */
  #nav-sidebar {
    background: var(--sidebar-bg);
    min-width: 240px;
    padding: 1.5rem 0;
  }

  #nav-sidebar .module caption,
  #nav-sidebar h2 {
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #818cf8;
    padding: .75rem 1.5rem .25rem;
  }

  #nav-sidebar a:link,
  #nav-sidebar a:visited {
    color: var(--sidebar-text);
    padding: .5rem 1.5rem;
    display: block;
    font-size: .875rem;
    border-left: 3px solid transparent;
    transition: var(--transition);
    text-decoration: none;
  }

  #nav-sidebar a:hover,
  #nav-sidebar a.selected {
    background: var(--sidebar-hover);
    border-left-color: var(--primary);
    color: #fff;
  }

  /* ── Content Area ── */
  #content-main { padding: 2rem; }

  #content {
    background: transparent;
    padding: 2rem;
  }

  /* ── Modules / Cards ── */
  .module {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .module h2, .module caption {
    background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff;
    font-size: .8rem;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    padding: .75rem 1.25rem;
    margin: 0;
  }

  /* ── Buttons ── */
  .button, input[type=submit], input[type=button],
  .submit-row input, a.button {
    background: var(--primary);
    color: #fff !important;
    border: none;
    border-radius: .5rem;
    padding: .5rem 1.25rem;
    font-size: .875rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: .4rem;
  }

  .button:hover, input[type=submit]:hover { background: var(--primary-dark); transform: translateY(-1px); }

  .button.default, input[type=submit].default { background: var(--primary-dark); }

  .deletelink {
    background: var(--danger) !important;
    color: #fff !important;
    border-radius: .5rem;
    padding: .4rem 1rem;
    font-size: .875rem;
    font-weight: 600;
    text-decoration: none;
    transition: var(--transition);
  }

  .deletelink:hover { background: #dc2626 !important; }

  /* ── Tables ── */
  #result_list, .table {
    width: 100%;
    border-collapse: collapse;
    font-size: .875rem;
  }

  #result_list thead th {
    background: var(--surface-alt);
    color: var(--text-muted);
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    padding: .75rem 1rem;
    border-bottom: 2px solid var(--border);
  }

  #result_list th a:link, #result_list th a:visited { color: var(--text-muted); }
  #result_list th a:hover { color: var(--primary); }

  #result_list td {
    padding: .75rem 1rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }

  #result_list tr:last-child td { border-bottom: none; }

  #result_list tbody tr:hover { background: var(--primary-light); }

  #result_list td a:link, #result_list td a:visited {
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;
  }

  #result_list td a:hover { color: var(--primary-dark); }

  /* ── Forms ── */
  .form-row {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .form-row:last-child { border-bottom: none; }

  label {
    font-size: .8rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    display: block;
    margin-bottom: .35rem;
  }

  input[type=text], input[type=password], input[type=email],
  input[type=number], select, textarea {
    background: var(--surface-alt);
    border: 1.5px solid var(--border);
    border-radius: .5rem;
    padding: .55rem .9rem;
    font-size: .9rem;
    color: var(--text);
    width: 100%;
    max-width: 500px;
    transition: var(--transition);
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }

  /* ── Messages ── */
  .messagelist {
    list-style: none;
    padding: 0;
    margin: 0 0 1.5rem;
  }

  .messagelist li {
    padding: .75rem 1.25rem;
    border-radius: var(--radius);
    font-size: .875rem;
    font-weight: 500;
    margin-bottom: .5rem;
  }

  .messagelist .success { background: #d1fae5; color: #065f46; border-left: 4px solid var(--success); }
  .messagelist .warning { background: #fef3c7; color: #92400e; border-left: 4px solid var(--accent); }
  .messagelist .error   { background: #fee2e2; color: #991b1b; border-left: 4px solid var(--danger); }

  /* ── Breadcrumbs ── */
  div.breadcrumbs {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: .6rem 2rem;
    font-size: .8rem;
    color: var(--text-muted);
  }

  div.breadcrumbs a { color: var(--primary); text-decoration: none; font-weight: 500; }
  div.breadcrumbs a:hover { text-decoration: underline; }

  /* ── Pagination ── */
  .paginator {
    display: flex;
    align-items: center;
    gap: .4rem;
    font-size: .85rem;
    padding: 1rem 0;
  }

  .paginator a, .paginator span.this-page {
    padding: .35rem .75rem;
    border-radius: .4rem;
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: var(--transition);
  }

  .paginator a:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
  .paginator span.this-page { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 700; }

  /* ── Filters ── */
  #changelist-filter {
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 1.5rem;
    min-width: 200px;
  }

  #changelist-filter h2 {
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-muted);
    margin: 0 0 1rem;
  }

  #changelist-filter h3 {
    font-size: .75rem;
    font-weight: 700;
    color: var(--text);
    margin: 1rem 0 .5rem;
  }

  #changelist-filter ul { list-style: none; padding: 0; margin: 0; }

  #changelist-filter li a {
    font-size: .8rem;
    color: var(--text-muted);
    text-decoration: none;
    display: block;
    padding: .25rem 0;
    transition: var(--transition);
  }

  #changelist-filter li a:hover,
  #changelist-filter li.selected a { color: var(--primary); font-weight: 600; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    #content { padding: 1rem; }
    #nav-sidebar { display: none; }
    #header { padding: 0 1rem; }
  }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}">⚙️ ToolX Admin</a>
</h1>
{% endblock %}
